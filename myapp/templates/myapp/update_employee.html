<h2>Update Employee</h2>

<form method="POST">
    {% csrf_token %}

    Nama:
    <input type="text" name="empname" value="{{ emp.empname }}"><br>

    Contact:
    <input type="text" name="contact" value="{{ emp.contact }}"><br>

    Salary:
    <input type="number" name="salary" value="{{ emp.salary }}"><br>

    <button type="submit">Update</button>
</form>
