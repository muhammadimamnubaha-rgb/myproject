{% extends 'myapp/base.html' %}

{% block content %}
<h2>Edit Artikel</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="judul" value="{{ artikel.judul }}"><br><br>
    <textarea name="isi">{{ artikel.isi }}</textarea><br><br>
    <button type="submit">Update</button>
</form>

{% endblock %}
